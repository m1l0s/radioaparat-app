name: Update Super Meni JSON

on:
  schedule:
    # Subota 08:00 UTC = 09:00 CET (10:00 CEST) — Super Meni izlazi subotom
    - cron: '0 8 * * 6'
    # Ponedeljak 08:00 UTC = 09:00 CET (10:00 CEST) — drugi pokušaj ako subota nije bila ažurirana
    - cron: '0 8 * * 1'
  workflow_dispatch: # Ručno pokretanje

jobs:
  update-supermeni:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Super Meni page and parse
        run: |
          python3 - << 'PYEOF'
          import urllib.request
          import json
          import re
          import sys
          from datetime import datetime

          URL = 'https://radioaparat.rs/super-meni/'

          headers = {
            'User-Agent': 'Mozilla/5.0 (compatible; radioAPARAT-bot/1.0)',
            'Accept': 'text/html,application/xhtml+xml',
          }

          try:
            req = urllib.request.Request(URL, headers=headers)
            with urllib.request.urlopen(req, timeout=30) as resp:
              html = resp.read().decode('utf-8', errors='replace')
            print(f'Fetched {len(html)} bytes')
          except Exception as e:
            print(f'ERROR fetching page: {e}')
            sys.exit(1)

          tracks = []

          # Strategija 1: HTML tabela <tr><td>
          tr_matches = re.findall(r'<tr[^>]*>([\s\S]*?)<\/tr>', html, re.IGNORECASE)
          for tr in tr_matches:
            tds = re.findall(r'<td[^>]*>([\s\S]*?)<\/td>', tr, re.IGNORECASE)
            cells = [re.sub(r'<[^>]+>', ' ', td).replace('&amp;', '&').replace('&#39;', "'").replace('&nbsp;', ' ').strip() for td in tds]
            cells = [re.sub(r'\s+', ' ', c).strip() for c in cells]
            if len(cells) < 3:
              continue
            try:
              pos = int(cells[0])
            except:
              continue
            if pos < 1 or pos > 100:
              continue

            # Stvarna struktura tabele na radioaparat.rs:
            # cells[0] = pos, cells[1] = pn, cells[2] = "ARTIST – song",
            # cells[3] = ned (broj nedelja), cells[4] = naj (najveći plasman)
            raw = cells[2] if len(cells) > 2 else ''
            sep = ' \u2013 ' if ' \u2013 ' in raw else (' \u2014 ' if ' \u2014 ' in raw else ' - ')
            parts = raw.split(sep, 1)
            if len(parts) != 2 or not parts[0].strip() or not parts[1].strip():
              continue
            pn_raw  = cells[1].strip() if len(cells) > 1 else ''
            ned_raw = cells[3].strip() if len(cells) > 3 else '1'
            naj_raw = cells[4].strip() if len(cells) > 4 else cells[0].strip()
            track = {
              'pos':    cells[0].strip().zfill(2),
              'pn':     pn_raw.zfill(2)  if pn_raw.isdigit()  else '00',
              'artist': parts[0].strip(),
              'song':   parts[1].strip(),
              'ned':    ned_raw if ned_raw.isdigit() else '1',
              'naj':    naj_raw.zfill(2) if naj_raw.isdigit() else cells[0].strip().zfill(2),
            }

            if track['artist'] and track['song']:
              tracks.append(track)

          # Strategija 2: text tabela "| 01 | ... |"
          if not tracks:
            for line in html.split('\n'):
              cols = [c.strip() for c in line.split('|') if c.strip()]
              if len(cols) < 3:
                continue
              try:
                pos = int(cols[0])
              except:
                continue
              if pos < 1 or pos > 100:
                continue
              raw = cols[2] if len(cols) > 2 else ''
              sep = ' \u2013 ' if ' \u2013 ' in raw else (' \u2014 ' if ' \u2014 ' in raw else ' - ')
              if sep not in raw:
                continue
              parts = raw.split(sep, 1)
              if len(parts) != 2 or not parts[0].strip():
                continue
              pn_raw  = cols[1].strip() if len(cols) > 1 else ''
              ned_raw = cols[3].strip() if len(cols) > 3 else '1'
              naj_raw = cols[4].strip() if len(cols) > 4 else cols[0].strip()
              tracks.append({
                'pos':    cols[0].strip().zfill(2),
                'pn':     pn_raw.zfill(2)  if pn_raw.isdigit()  else '00',
                'artist': parts[0].strip(),
                'song':   parts[1].strip(),
                'ned':    ned_raw if ned_raw.isdigit() else '1',
                'naj':    naj_raw.zfill(2) if naj_raw.isdigit() else cols[0].strip().zfill(2),
              })

          if not tracks:
            print('ERROR: 0 pesama parsiranih')
            sys.exit(1)

          print(f'Parsed {len(tracks)} tracks')

          # Izvuci datum iz stranice
          date_str = ''
          dm = re.search(r'SUPER\s+MENI\s*[–\-]\s*([^<\n"]{4,40})', html, re.IGNORECASE)
          if dm:
            date_str = 'SUPER MENI – ' + dm.group(1).strip().rstrip('.')

          result = {
            'updated': datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
            'date': date_str,
            'tracks': tracks
          }

          with open('supermeni.json', 'w', encoding='utf-8') as f:
            json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'supermeni.json written, date="{date_str}"')
          PYEOF

      - name: Commit supermeni.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add supermeni.json
          if git diff --staged --quiet; then
            echo "No changes to supermeni.json"
          else
            git commit -m "chore: update supermeni.json [$(date -u '+%Y-%m-%d')]"
            git push
          fi
