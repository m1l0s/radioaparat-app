name: Ažuriraj raspored

on:
  schedule:
    # Pokreće se svaka 3 sata
    - cron: '0 */3 * * *'
  # Dozvoli i ručno pokretanje iz GitHub UI
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: Podesi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instaliraj zavisnosti
        run: npm install node-fetch cheerio
        working-directory: scripts

      - name: Fetchuj i parsiraj raspored
        run: node fetch-schedule.js
        working-directory: scripts

      - name: Commit i push ako ima promena
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add schedule.json
          # Commit samo ako ima stvarnih promena
          git diff --staged --quiet || git commit -m "Raspored ažuriran: $(date -u '+%d.%m.%Y. %H:%M') UTC"
          git push
