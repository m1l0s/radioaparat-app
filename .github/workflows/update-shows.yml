name: Konvertuj emisije (Excel → JSON)

on:
  push:
    branches: [main]
    paths:
      - 'radioaparat_linkovi.xlsx'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: Podesi Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instaliraj zavisnosti
        run: npm install xlsx
        working-directory: scripts

      - name: Konvertuj Excel u JSON
        run: node convert-shows.js
        working-directory: scripts

      - name: Commit i push ako ima promena
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows.json
          git diff --staged --quiet || git commit -m "shows.json ažuriran: $(date -u '+%d.%m.%Y. %H:%M') UTC"
          git push
